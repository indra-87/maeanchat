<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>매안초등학교 교육과정 리뷰&빌드업</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --cream:#FFF8EC; --cream-deep:#FBEFD9; --coral:#FF6B7A; --coral-deep:#E84F62;
  --leaf:#5FA777; --leaf-deep:#3F8159; --ink:#4A3B30; --ink-soft:#8A7A6B;
  --card:#FFFFFF; --gold:#FFC93C; --sky:#5B9BD5; --sky-deep:#3F7CB5;
  --shadow:0 10px 0 rgba(74,59,48,0.08);
  --msg-font-size:17px; --msg-nick-size:12px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0; height:100%;}
body{
  background:radial-gradient(circle at 10% 0%, var(--cream-deep), var(--cream) 60%);
  font-family:'Noto Sans KR', sans-serif; color:var(--ink);
  min-height:100vh; overscroll-behavior:none;
}
.hidden{display:none !important;}
button{font-family:inherit;}

/* ---------- Gate (nickname entry) ---------- */
.gate-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
.gate-card{background:var(--card); border-radius:28px; padding:38px 30px; max-width:420px; width:100%; box-shadow:var(--shadow); border:3px solid #FFE7CF; text-align:center;}
.gate-emoji{font-size:46px; margin-bottom:6px;}
.gate-title{font-family:'Jua',sans-serif; font-size:24px; color:var(--coral-deep); line-height:1.4; margin:0 0 6px;}
.gate-sub{font-size:14px; color:var(--ink-soft); margin:0 0 22px;}
.gate-card input{width:100%; padding:15px; border-radius:14px; border:2px solid #F0DDBF; font-size:17px; text-align:center; margin-bottom:12px; outline:none; font-family:'Noto Sans KR',sans-serif;}
.gate-card input:focus{border-color:var(--coral);}
.gate-card .pw-row{display:none;}
.gate-card .pw-row.show{display:block;}
.gate-btn{width:100%; padding:15px; border-radius:14px; border:none; background:var(--coral-deep); color:#fff; font-size:16px; font-weight:700; cursor:pointer; box-shadow:0 6px 0 rgba(0,0,0,.1); transition:transform .08s;}
.gate-btn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.1);}
.gate-err{color:var(--coral-deep); font-size:13px; min-height:18px; margin-top:10px; font-weight:600;}
.admin-toggle{margin-top:16px; font-size:12px; color:var(--ink-soft); background:none; border:none; text-decoration:underline; cursor:pointer; padding:4px;}

/* ---------- App shell ---------- */
.app-shell{display:flex; flex-direction:column; height:100vh;}
.chat-header{flex-shrink:0; background:linear-gradient(180deg, #FF8C97, var(--coral-deep)); color:#fff; padding:10px 12px; box-shadow:0 4px 12px rgba(0,0,0,.1); display:flex; align-items:center; gap:6px; z-index:5; flex-wrap:wrap;}
.chat-header .title-block{display:flex; flex-direction:column; min-width:0; flex:1 1 auto; overflow:hidden;}
.chat-header .app-name{font-family:'Jua',sans-serif; font-size:16px; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.chat-header .online-count{font-size:11px; opacity:.9; font-weight:500;}
.chat-header .me-badge{font-size:12px; background:rgba(255,255,255,.22); padding:6px 10px; border-radius:999px; font-weight:700; white-space:nowrap; flex-shrink:0;}
.chat-header .me-badge.admin{background:var(--gold); color:#5A3E00;}
.icon-btn{background:rgba(255,255,255,.22); border:none; color:#fff; width:34px; height:34px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.icon-btn:active{transform:scale(.92);}

.admin-toolbar{flex-shrink:0; background:#FFF3E0; border-bottom:2px solid #F3E8D4; padding:8px 10px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.admin-tool-btn{background:#fff; border:1.5px solid #E5D6BF; border-radius:10px; padding:7px 12px; font-size:12.5px; font-weight:700; color:var(--ink); cursor:pointer;}
.admin-tool-btn.danger{background:#FFE3E3; color:#C8222F; border-color:#FFC9C9;}
.admin-tool-btn.fw{background:#FFF3D0; color:#9A6B00; border-color:#FFE0A3;}
.admin-tool-btn.fw-reset{background:#E6F2EC; color:var(--leaf-deep); border-color:#CDE9DA;}
.admin-tool-btn.qr-pin{background:#EAF1FB; color:var(--sky-deep); border-color:#CFE0F5;}
.admin-tool-btn.qr-pin.active{background:var(--sky); color:#fff; border-color:var(--sky-deep);}

.qr-pinned-bar{flex-shrink:0; background:#fff; border-bottom:2px solid #E3ECF7; padding:10px 14px; display:flex; align-items:center; gap:12px;}
.qr-pinned-box{flex-shrink:0; width:88px; height:88px; background:#fff; border:1px solid #E3ECF7; border-radius:10px; display:flex; align-items:center; justify-content:center; padding:2px;}
.qr-pinned-text{flex:1; min-width:0;}
.qr-pinned-title{font-family:'Jua',sans-serif; color:var(--sky-deep); font-size:15px; margin-bottom:4px;}
.qr-pinned-url{font-size:12px; color:var(--ink-soft); word-break:break-all;}
.qr-pinned-close{flex-shrink:0; width:30px; height:30px; border-radius:50%; border:none; background:#F0F3F8; color:var(--ink-soft); font-size:13px; cursor:pointer;}
.qr-pinned-close:active{transform:scale(.9);}
.admin-tool-btn:active{transform:scale(.96);}
.select-actions{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink-soft); font-weight:600;}

.chat-body{flex:1; overflow:hidden; position:relative; display:flex;}
.messages{flex:1; overflow-y:auto; padding:14px 12px 10px; display:flex; flex-direction:column; gap:8px; -webkit-overflow-scrolling:touch;}

.msg-row{display:flex; flex-direction:column; max-width:78%; animation:msgIn .2s ease;}
@keyframes msgIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
.msg-row.me{align-self:flex-end; align-items:flex-end;}
.msg-row.other{align-self:flex-start; align-items:flex-start;}
.msg-nick{font-size:var(--msg-nick-size); color:var(--ink-soft); margin:0 4px 2px; font-weight:700;}
.msg-bubble-line{display:flex; align-items:center; gap:6px;}
.msg-row.me .msg-bubble-line{flex-direction:row-reverse;}
.msg-bubble{padding:10px 14px; border-radius:18px; font-size:var(--msg-font-size); line-height:1.45; word-break:break-word; box-shadow:0 2px 4px rgba(0,0,0,.06); position:relative; transition:font-size .15s ease;}
.msg-row.me .msg-bubble{background:var(--coral-deep); color:#fff; border-radius:18px 18px 4px 18px;}
.msg-row.other .msg-bubble{background:#fff; color:var(--ink); border:1px solid #F0E4CC; border-radius:18px 18px 18px 4px;}
.msg-time{font-size:10px; color:var(--ink-soft); flex-shrink:0; white-space:nowrap;}
.msg-del-btn{background:none; border:none; color:var(--coral-deep); font-size:13px; cursor:pointer; padding:2px 4px; opacity:.7;}
.msg-del-btn:active{opacity:1;}
.msg-check{display:none; width:20px; height:20px; border-radius:50%; border:2px solid var(--coral); flex-shrink:0; align-items:center; justify-content:center; font-size:12px; color:#fff;}
.msg-row.selectable{cursor:pointer;}
.msg-row.selectable .msg-check{display:flex;}
.msg-row.selectable.selected .msg-check{background:var(--coral-deep);}
.msg-row.selectable.selected .msg-bubble{outline:2px solid var(--coral-deep); outline-offset:2px;}

.msg-row.system{align-self:center; max-width:90%;}
.msg-row.system .msg-bubble-line{display:flex; align-items:center; gap:6px;}
.msg-row.system .msg-bubble{background:var(--cream-deep); color:var(--ink-soft); font-size:13px; padding:7px 14px; border:1px dashed #E5CFA8;}
.msg-row.system .msg-del-btn{opacity:.6;}

.firework-msg{align-self:center; font-family:'Jua',sans-serif; font-size:15px; color:var(--gold); text-shadow:0 1px 0 rgba(0,0,0,.08); padding:4px 0;}

.composer{flex-shrink:0; background:#fff; border-top:2px solid #F3E8D4; padding:10px 10px; display:flex; gap:8px; align-items:flex-end; padding-bottom:max(10px, env(safe-area-inset-bottom));}
.composer textarea{flex:1; resize:none; border:2px solid #F0DDBF; border-radius:18px; padding:11px 14px; font-size:15px; font-family:inherit; max-height:90px; outline:none; line-height:1.4;}
.composer textarea:focus{border-color:var(--coral);}
.send-btn, .fw-btn{flex-shrink:0; width:46px; height:46px; border-radius:50%; border:none; cursor:pointer; font-size:19px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 rgba(0,0,0,.1);}
.send-btn{background:var(--coral-deep); color:#fff;}
.send-btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.1);}
.send-btn:disabled{opacity:.4; cursor:not-allowed;}
.fw-btn{background:linear-gradient(180deg,#FFD75E,var(--gold)); color:#5A3E00;}
.fw-btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.1);}
.fw-btn:disabled{opacity:.35; cursor:not-allowed; filter:grayscale(.6);}

.emoji-bar{flex-shrink:0; background:#fff; border-top:1px solid #F3E8D4; padding:8px 10px; display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch;}
.emoji-bar button{flex-shrink:0; font-size:22px; background:var(--cream-deep); border:none; border-radius:12px; width:40px; height:40px; cursor:pointer;}
.emoji-bar button:active{transform:scale(.88);}

/* ---------- Side panel (online users / admin) ---------- */
.side-panel{position:fixed; top:0; right:0; width:280px; max-width:84vw; height:100%; background:#fff; box-shadow:-6px 0 20px rgba(0,0,0,.12); z-index:20; transform:translateX(100%); transition:transform .22s ease; display:flex; flex-direction:column;}
.side-panel.open{transform:translateX(0);}
.side-panel-header{padding:16px; border-bottom:2px solid #F3E8D4; display:flex; align-items:center; justify-content:space-between; flex-shrink:0;}
.side-panel-header h3{margin:0; font-family:'Jua',sans-serif; color:var(--coral-deep); font-size:17px;}
.side-panel-close{background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink-soft); padding:4px;}
.user-list{flex:1; overflow-y:auto; padding:10px;}
.user-item{display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-radius:12px; margin-bottom:4px; font-size:14px; gap:6px; flex-wrap:wrap;}
.user-item:hover{background:var(--cream-deep);}
.user-item .uname{display:flex; align-items:center; gap:6px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.user-item .uname .dot{width:8px; height:8px; border-radius:50%; background:var(--leaf); flex-shrink:0;}
.user-item .admin-tag{font-size:10px; background:var(--gold); color:#5A3E00; padding:2px 6px; border-radius:6px; font-weight:700; flex-shrink:0;}
.kick-btn{background:#FFE3E3; color:#C8222F; border:none; border-radius:8px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0;}
.refill-btn{background:#FFF3D0; color:#9A6B00; border:none; border-radius:8px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer; flex-shrink:0;}
.scrim{position:fixed; inset:0; background:rgba(0,0,0,.25); z-index:15; opacity:0; pointer-events:none; transition:opacity .2s;}
.scrim.show{opacity:1; pointer-events:auto;}

.qr-fab-wrap{position:fixed; bottom:90px; right:16px; z-index:8;}
.qr-modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:30; display:flex; align-items:center; justify-content:center; padding:20px;}
.qr-modal{background:#fff; border-radius:24px; padding:28px; text-align:center; max-width:320px; box-shadow:var(--shadow);}
.qr-modal h3{font-family:'Jua',sans-serif; color:var(--coral-deep); margin:0 0 14px;}
.qr-modal .qr-box{display:flex; justify-content:center; margin-bottom:14px;}
.qr-modal .qr-url{font-size:11px; color:var(--ink-soft); word-break:break-all; margin-bottom:16px;}
.qr-modal button{padding:10px 22px; border:none; border-radius:12px; background:var(--leaf); color:#fff; font-weight:700; cursor:pointer;}

/* ---------- Photo attach / preview ---------- */
.photo-btn{flex-shrink:0; width:46px; height:46px; border-radius:50%; border:none; cursor:pointer; font-size:19px; background:var(--cream-deep); color:var(--ink); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 0 rgba(0,0,0,.06);}
.photo-btn:active{transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.06);}

.img-preview-bar{flex-shrink:0; background:#fff; border-top:1px solid #F3E8D4; padding:8px 12px; display:flex; align-items:center; gap:10px;}
.img-preview-thumb-wrap{position:relative; width:52px; height:52px; flex-shrink:0;}
.img-preview-thumb-wrap img{width:100%; height:100%; object-fit:cover; border-radius:10px; border:1px solid #F0DDBF;}
.img-preview-thumb-wrap button{position:absolute; top:-7px; right:-7px; width:20px; height:20px; border-radius:50%; background:var(--coral-deep); color:#fff; border:none; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1;}
.img-preview-label{font-size:13px; color:var(--ink-soft); font-weight:600;}

/* ---------- Photo inside message bubble ---------- */
.msg-bubble.has-photo{padding:6px; background:transparent !important; border:none !important; box-shadow:none;}
.msg-row.other .msg-bubble.has-photo{border:1px solid #F0E4CC; background:#fff !important;}
.msg-row.me .msg-bubble.has-photo{background:var(--coral-deep) !important;}
.msg-photo{display:block; max-width:200px; max-height:240px; width:auto; height:auto; border-radius:14px; cursor:pointer; object-fit:cover;}
.msg-bubble.has-photo .msg-text{padding:8px 8px 2px; font-size:var(--msg-font-size); line-height:1.45;}
.msg-row.me .msg-bubble.has-photo .msg-text{color:#fff;}
.msg-row.other .msg-bubble.has-photo .msg-text{color:var(--ink);}

/* ---------- Photo viewer (fullscreen) ---------- */
.photo-viewer-bg{position:fixed; inset:0; background:rgba(0,0,0,.88); z-index:70; display:flex; align-items:center; justify-content:center; padding:24px;}
.photo-viewer-img{max-width:100%; max-height:100%; border-radius:10px; box-shadow:0 10px 40px rgba(0,0,0,.5);}
.photo-viewer-close{position:fixed; top:18px; right:18px; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.15); color:#fff; border:none; font-size:18px; cursor:pointer; z-index:71;}
.photo-viewer-close:active{transform:scale(.92);}

/* ---------- Firework canvas overlay ---------- */
#fwCanvas{position:fixed; inset:0; pointer-events:none; z-index:50;}

/* ---------- Toast ---------- */
.toast{position:fixed; bottom:100px; left:50%; transform:translateX(-50%); background:rgba(74,59,48,.92); color:#fff; padding:10px 18px; border-radius:999px; font-size:13px; z-index:60; opacity:0; transition:opacity .25s, transform .25s; pointer-events:none;}
.toast.show{opacity:1;}

/* ---------- Banned screen ---------- */
.banned-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; text-align:center;}
.banned-card{background:#fff; border-radius:24px; padding:34px 26px; max-width:380px; box-shadow:var(--shadow);}
.banned-card .emoji{font-size:42px;}
.banned-card h2{font-family:'Jua',sans-serif; color:var(--coral-deep); margin:8px 0;}
.banned-card p{color:var(--ink-soft); font-size:14px; line-height:1.6;}

@media (min-width:560px){
  .gate-wrap{padding:40px;}
}
</style>
</head>
<body>

<div id="app"></div>
<canvas id="fwCanvas"></canvas>
<div id="toast" class="toast"></div>

<script>
/* =========================================================
   매안초등학교 교육과정 리뷰&빌드업 - 실시간 채팅앱
   - 비로그인 / 닉네임 입장
   - Supabase REST + Realtime 사용
   - 단일 HTML 파일로 GitHub Pages 등에 바로 배포 가능
   ========================================================= */

const APP_NAME = "매안초등학교 교육과정 리뷰&빌드업";

/* ----- Supabase 연결 정보: 기존 프로젝트 값으로 교체하세요 ----- */
const SB_URL = "https://pqjuvuflinnrpemqcafl.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxanV2dWZsaW5ucnBlbXFjYWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NzAzMjQsImV4cCI6MjA5NDA0NjMyNH0.E4sJv1gM9TbWG-2o90aH8wJXZMLRY_uLQ9fgWARX1Ro";
const SB_H = {"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Prefer":"return=representation"};
const SB_WS = SB_URL.replace("https://","wss://") + "/realtime/v1/websocket?apikey=" + SB_KEY + "&vsn=1.0.0";

/* ----- 관리자 계정 (닉네임 + 비밀번호) -----
   실제 운영 시 원하는 값으로 바꿔서 쓰세요. */
const ADMIN_NICKNAME = "관리자";
const ADMIN_PASSWORD = "maean2026";

/* ----- 설정값 ----- */
const PRESENCE_HEARTBEAT_MS = 8000;    // 8초마다 내 접속 신호 갱신
const PRESENCE_STALE_MS = 25000;       // 25초 이상 신호 없으면 접속 종료로 간주
const BAN_DURATION_MS = 5 * 60 * 1000; // 강퇴(임시 제재) 5분
const MAX_MESSAGE_LEN = 500;
const MAX_FIREWORK_COUNT = 3;          // 1인당 최대 폭죽 발사 횟수
const FONT_SIZE_STEPS = [13, 14, 15, 16, 17, 18, 19, 21, 23, 25, 28, 31, 34, 38, 42, 46]; // 메시지 글자 크기 16단계 (프레젠테이션용 큰 글자 지원)
const DEFAULT_FONT_STEP_INDEX = 4; // 17px
const PHOTO_BUCKET = "chat-photos";
const MAX_PHOTO_BYTES = 5 * 1024 * 1024; // 업로드 최대 5MB (초과 시 자동 압축)
const PHOTO_MAX_DIMENSION = 1600; // 압축 시 가로/세로 최대 픽셀

/* ----- 전역 상태 ----- */
let myNickname = "";
let isAdmin = false;
let presenceTimer = null;
let pollTimer = null;
let lastMessageId = 0;
let lastFireworkEventId = 0;
let fireworkUsedCount = 0;
let extraFireworkCount = 0; // 관리자가 리필해준 추가 한도 (기본 MAX_FIREWORK_COUNT에 누적됨)
let realtimeSocket = null;
let realtimeRetryDelay = 1000;
let onlineUsers = []; // [{nickname, last_seen, banned_until}]
let selectMode = false;          // 관리자: 메시지 여러개 선택 삭제 모드
let selectedMessageIds = new Set();
let fontStepIndex = DEFAULT_FONT_STEP_INDEX;
let selectedPhotoBlob = null; // 전송 대기 중인 사진 (압축된 Blob)

/* ----- 공용 fetch 헬퍼 ----- */
async function sbGet(table, query){
  const res = await fetch(SB_URL + "/rest/v1/" + table + (query||""), { headers: SB_H });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbInsert(table, row){
  const res = await fetch(SB_URL + "/rest/v1/" + table, { method:"POST", headers: SB_H, body: JSON.stringify(row) });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbUpsert(table, row, conflictCol){
  const res = await fetch(SB_URL + "/rest/v1/" + table + "?on_conflict=" + conflictCol, {
    method:"POST",
    headers: {...SB_H, "Prefer":"resolution=merge-duplicates,return=representation"},
    body: JSON.stringify(row)
  });
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbDelete(table, query){
  const res = await fetch(SB_URL + "/rest/v1/" + table + (query||""), { method:"DELETE", headers: SB_H });
  if(!res.ok) throw new Error(await res.text());
  return res.json().catch(()=>null);
}
async function sbPatch(table, query, patch){
  const res = await fetch(SB_URL + "/rest/v1/" + table + (query||""), { method:"PATCH", headers: SB_H, body: JSON.stringify(patch) });
  if(!res.ok) throw new Error(await res.text());
  return res.json().catch(()=>null);
}

function escapeHtml(s){
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function showToast(msg, ms=2400){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=> t.classList.remove("show"), ms);
}
function formatClock(iso){
  const d = new Date(iso);
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return `${hh}:${mi}`;
}
function getQueryParam(name){
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

/* =========================================================
   1) 입장 화면 (닉네임 / 관리자 로그인)
   ========================================================= */
function renderGate(){
  const app = document.getElementById("app");
  const prefillNick = getQueryParam("nick") || "";
  app.innerHTML = `
    <div class="gate-wrap">
      <div class="gate-card">
        <div class="gate-emoji">🌷📋</div>
        <h1 class="gate-title">${APP_NAME}</h1>
        <p class="gate-sub">닉네임을 입력하고 채팅방에 들어와 주세요.</p>
        <input id="nickInput" maxlength="16" placeholder="닉네임 입력" value="${escapeHtml(prefillNick)}" />
        <div class="pw-row" id="pwRow">
          <input id="pwInput" type="password" maxlength="40" placeholder="관리자 비밀번호" />
        </div>
        <button class="gate-btn" id="enterBtn">입장하기</button>
        <div class="gate-err" id="gateErr"></div>
        <button class="admin-toggle" id="adminToggleBtn">관리자로 입장</button>
      </div>
    </div>
  `;

  let adminMode = false;
  const pwRow = document.getElementById("pwRow");
  const adminToggleBtn = document.getElementById("adminToggleBtn");
  const nickInput = document.getElementById("nickInput");
  const pwInput = document.getElementById("pwInput");
  const errBox = document.getElementById("gateErr");

  adminToggleBtn.onclick = () => {
    adminMode = !adminMode;
    pwRow.classList.toggle("show", adminMode);
    adminToggleBtn.textContent = adminMode ? "일반 사용자로 입장" : "관리자로 입장";
    if(adminMode){
      nickInput.value = ADMIN_NICKNAME;
    }
    errBox.textContent = "";
  };

  document.getElementById("enterBtn").onclick = () => attemptEnter();
  nickInput.addEventListener("keydown", e => { if(e.key === "Enter") attemptEnter(); });
  pwInput && pwInput.addEventListener("keydown", e => { if(e.key === "Enter") attemptEnter(); });

  async function attemptEnter(){
    const nick = nickInput.value.trim();
    errBox.textContent = "";

    if(!nick){ errBox.textContent = "닉네임을 입력해 주세요."; return; }
    if(nick.length > 16){ errBox.textContent = "닉네임은 16자 이내로 입력해 주세요."; return; }
    if(/^\s|\s$/.test(nickInput.value)){ /* trim 처리됨, 통과 */ }

    if(adminMode){
      const pw = pwInput.value;
      if(nick !== ADMIN_NICKNAME || pw !== ADMIN_PASSWORD){
        errBox.textContent = "닉네임 또는 비밀번호가 올바르지 않습니다.";
        return;
      }
      isAdmin = true;
    } else {
      isAdmin = false;
      if(nick === ADMIN_NICKNAME){
        errBox.textContent = "이 닉네임은 사용할 수 없습니다.";
        return;
      }
    }

    document.getElementById("enterBtn").disabled = true;
    document.getElementById("enterBtn").textContent = "입장 중...";

    try{
      // 강퇴(제재) 여부 확인
      const rows = await sbGet("chat_presence", `?nickname=eq.${encodeURIComponent(nick)}&select=banned_until`);
      if(rows.length > 0 && rows[0].banned_until){
        const until = new Date(rows[0].banned_until);
        if(until > new Date()){
          renderBannedScreen(until);
          return;
        }
      }

      // 닉네임 중복 접속 체크 (이미 활동중인 동일 닉네임 존재 여부)
      const activeCheck = await sbGet("chat_presence", `?nickname=eq.${encodeURIComponent(nick)}&select=last_seen`);
      if(activeCheck.length > 0){
        const lastSeen = new Date(activeCheck[0].last_seen);
        const isActive = (new Date() - lastSeen) < PRESENCE_STALE_MS;
        if(isActive && !isAdmin){
          errBox.textContent = "이미 같은 닉네임으로 접속 중인 사용자가 있어요.";
          document.getElementById("enterBtn").disabled = false;
          document.getElementById("enterBtn").textContent = "입장하기";
          return;
        }
      }

      myNickname = nick;
      await sbUpsert("chat_presence", { nickname: nick, last_seen: new Date().toISOString(), banned_until: null }, "nickname");

      // 폭죽 사용 횟수 / 추가 한도 확인
      const fwRows = await sbGet("chat_firework_used", `?nickname=eq.${encodeURIComponent(nick)}&select=nickname`);
      fireworkUsedCount = fwRows.length;
      try{
        const extraRows = await sbGet("chat_firework_extra", `?nickname=eq.${encodeURIComponent(nick)}&select=extra_count`);
        extraFireworkCount = extraRows.length ? extraRows[0].extra_count : 0;
      }catch(e){ extraFireworkCount = 0; }

      // 기존 폭죽 이벤트는 재생하지 않도록 마지막 이벤트 id로 초기화
      try{
        const lastFwEvent = await sbGet("chat_firework_events", "?select=id&order=id.desc&limit=1");
        lastFireworkEventId = lastFwEvent.length ? lastFwEvent[0].id : 0;
      }catch(e){ lastFireworkEventId = 0; }

      enterChatRoom();
    }catch(e){
      console.error(e);
      errBox.textContent = "입장에 실패했어요. 잠시 후 다시 시도해 주세요.";
      document.getElementById("enterBtn").disabled = false;
      document.getElementById("enterBtn").textContent = "입장하기";
    }
  }
}

/* 5MB를 초과하거나 너무 큰 이미지는 캔버스로 리사이즈/재압축 */
function compressImageIfNeeded(file){
  return new Promise((resolve, reject) => {
    if(file.size <= MAX_PHOTO_BYTES){
      // 용량은 괜찮아도 해상도가 매우 큰 사진은 가볍게 리사이즈
      resizeImageFile(file, PHOTO_MAX_DIMENSION, 0.88).then(resolve).catch(()=>resolve(file));
      return;
    }
    // 용량 초과 시 더 강하게 압축
    resizeImageFile(file, PHOTO_MAX_DIMENSION, 0.7).then(blob => {
      if(blob.size <= MAX_PHOTO_BYTES) resolve(blob);
      else {
        // 한 번 더 낮은 품질로 압축 시도
        resizeImageFile(file, Math.round(PHOTO_MAX_DIMENSION*0.8), 0.55).then(resolve).catch(reject);
      }
    }).catch(reject);
  });
}

function resizeImageFile(file, maxDim, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => {
      img.onload = () => {
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * (maxDim/width)); width = maxDim; }
          else { width = Math.round(width * (maxDim/height)); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => {
          if(blob) resolve(blob); else reject(new Error("이미지 변환 실패"));
        }, "image/jpeg", quality);
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* 닉네임에 한글 등이 포함되어도 Storage가 거부하지 않도록,
   경로는 항상 영문/숫자만으로 구성하고 닉네임은 파일명에 안전하게 슬러그 처리해 남김 */
function safeSlug(str){
  // 한글, 특수문자 등을 전부 제거하고 영문/숫자만 남김 (없으면 'user'로 대체)
  const slug = (str || "").replace(/[^a-zA-Z0-9]/g, "");
  return slug || "user";
}

async function uploadPhotoAndGetUrl(blob){
  const fileName = `${Date.now()}_${Math.random().toString(36).slice(2,8)}_${safeSlug(myNickname)}.jpg`;
  const path = `uploads/${fileName}`; // 폴더명도 고정된 영문으로 사용 (한글 경로 금지 이슈 회피)
  const res = await fetch(`${SB_URL}/storage/v1/object/${PHOTO_BUCKET}/${path}`, {
    method: "POST",
    headers: {
      "apikey": SB_KEY,
      "Authorization": "Bearer " + SB_KEY,
      "Content-Type": "image/jpeg"
    },
    body: blob
  });
  if(!res.ok) throw new Error(await res.text());
  return `${SB_URL}/storage/v1/object/public/${PHOTO_BUCKET}/${path}`;
}

/* public URL에서 "닉네임/파일명.jpg" 형태의 객체 경로만 추출 */
function extractStoragePathFromUrl(url){
  if(!url) return null;
  const marker = `/storage/v1/object/public/${PHOTO_BUCKET}/`;
  const idx = url.indexOf(marker);
  if(idx === -1) return null;
  return url.slice(idx + marker.length);
}

/* Storage에서 실제 파일을 삭제 (용량 회수). 실패해도 채팅 메시지 삭제는 막지 않음 */
async function deletePhotoFromStorage(imageUrl){
  const path = extractStoragePathFromUrl(imageUrl);
  if(!path) return;
  try{
    const res = await fetch(`${SB_URL}/storage/v1/object/${PHOTO_BUCKET}/${path}`, {
      method: "DELETE",
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
    });
    if(!res.ok) console.warn("사진 파일 삭제 실패:", await res.text());
  }catch(e){
    console.warn("사진 파일 삭제 중 오류:", e);
  }
}

/* 여러 개를 한 번에 삭제 (개별 DELETE 호출을 병렬로 실행 - 호환성을 위해 단일 객체 API 사용) */
async function deletePhotosFromStorage(imageUrls){
  const urls = imageUrls.filter(Boolean);
  if(urls.length === 0) return;
  await Promise.all(urls.map(url => deletePhotoFromStorage(url)));
}

/* ----- 메시지 불러오기 / 렌더링 ----- */
async function loadInitialMessages(){
  try{
    const rows = await sbGet("chat_messages", "?select=*&order=created_at.asc&limit=200");
    const box = document.getElementById("messages");
    box.innerHTML = "";
    rows.forEach(appendMessageEl);

  }catch(e){
    console.error(e);
    showToast("이전 채팅 기록을 불러오지 못했어요.");

function appendMessageEl(row){
  const box = document.getElementById("messages");
  if(!box) return;
  const wasNearBottom = isNearBottom(box);

  const el = document.createElement("div");

  if(row.is_system){
    el.className = "msg-row system";
    if(selectMode && isAdmin) el.classList.add("selectable");
    const delBtn = isAdmin ? `<button class="msg-del-btn" data-action="delete" title="삭제">🗑</button>` : "";
    el.innerHTML = `
      <div class="msg-bubble-line">
        <div class="msg-check" data-action="select">☑</div>
        <div class="msg-bubble">${escapeHtml(row.content)}</div>
        ${delBtn}
      </div>
    `;
    const delEl = el.querySelector('[data-action="delete"]');
    if(delEl) delEl.onclick = (e) => { e.stopPropagation(); deleteMessage(row.id, false); };
    el.addEventListener("click", () => {
      if(isAdmin && selectMode){
        toggleMessageSelected(row.id, el);
      }
    });
  } else {
    const mine = row.nickname === myNickname;
    el.className = "msg-row " + (mine ? "me" : "other");
    if(selectMode) el.classList.add("selectable");

    // 관리자는 모든 메시지를, 본인은 자신의 메시지만 삭제 가능
    const canDelete = isAdmin || mine;
    const delBtn = canDelete ? `<button class="msg-del-btn" data-action="delete" title="삭제">🗑</button>` : "";
    const imageHtml = row.image_url
      ? `<img class="msg-photo" src="${escapeHtml(row.image_url)}" alt="첨부 사진" data-action="view-photo" />`
      : "";
    const textHtml = row.content ? `<div class="msg-text">${escapeHtml(row.content)}</div>` : "";
    el.innerHTML = `
      <div class="msg-nick">${escapeHtml(row.nickname)}${row.nickname===ADMIN_NICKNAME?' 👑':''}</div>
      <div class="msg-bubble-line">
        <div class="msg-check" data-action="select">☑</div>
        <div class="msg-bubble ${row.image_url ? 'has-photo' : ''}">
          ${imageHtml}
          ${textHtml}
        </div>
        <span class="msg-time">${formatClock(row.created_at)}</span>
        ${delBtn}
      </div>
    `;
    const delEl = el.querySelector('[data-action="delete"]');
    if(delEl) delEl.onclick = (e) => { e.stopPropagation(); deleteMessage(row.id, mine); };
    const photoEl = el.querySelector('[data-action="view-photo"]');
    if(photoEl) photoEl.onclick = (e) => { e.stopPropagation(); openPhotoViewer(row.image_url); };

    el.addEventListener("click", () => {
      if(isAdmin && selectMode){
        toggleMessageSelected(row.id, el);
      }
    });
  }
  el.dataset.id = row.id;
  box.appendChild(el);
  if(wasNearBottom) scrollToBottom();
}

function isNearBottom(box){
  return box.scrollHeight - box.scrollTop - box.clientHeight < 120;
}
function scrollToBottom(){
  const box = document.getElementById("messages");
  if(box) box.scrollTop = box.scrollHeight;
}

async function deleteMessage(id, isMine){
  if(!isAdmin && !isMine) return; // 안전장치
  const confirmMsg = isAdmin && !isMine ? "이 메시지를 삭제할까요? (관리자 권한)" : "이 메시지를 삭제할까요?";
  if(!confirm(confirmMsg)) return;
  try{
    // 첨부 사진이 있으면 Storage 용량도 회수되도록 함께 삭제
    try{
      const rows = await sbGet("chat_messages", `?id=eq.${id}&select=image_url`);
      if(rows.length && rows[0].image_url){
        await deletePhotoFromStorage(rows[0].image_url);
      }
    }catch(e){ console.warn("첨부 사진 조회 실패", e); }

    await sbDelete("chat_messages", `?id=eq.${id}`);
    const el = document.querySelector(`.messages [data-id="${id}"]`);
    if(el) el.remove();
  }catch(e){
    console.error(e);
    showToast("삭제에 실패했어요.");
  }
}

/* =========================================================
   3) Presence (접속자 관리)
   ========================================================= */
function startPresenceHeartbeat(){
  sendHeartbeat();
  presenceTimer = setInterval(sendHeartbeat, PRESENCE_HEARTBEAT_MS);
}
async function sendHeartbeat(){
  try{
    await sbUpsert("chat_presence", { nickname: myNickname, last_seen: new Date().toISOString() }, "nickname");
    // 내가 강퇴되었는지 체크
    const rows = await sbGet("chat_presence", `?nickname=eq.${encodeURIComponent(myNickname)}&select=banned_until`);
    if(rows.length && rows[0].banned_until){
      const until = new Date(rows[0].banned_until);
      if(until > new Date()){
        cleanupAndKickOut(until);
        return;
      }
    }
    // 관리자가 폭죽 횟수를 리필/리셋했을 수 있으므로 주기적으로 동기화 (관리자 본인은 무제한이라 제외)
    if(!isAdmin){
      const fwRows = await sbGet("chat_firework_used", `?nickname=eq.${encodeURIComponent(myNickname)}&select=id`);
      let changed = false;
      if(fwRows.length !== fireworkUsedCount){
        fireworkUsedCount = fwRows.length;
        changed = true;
      }
      try{
        const extraRows = await sbGet("chat_firework_extra", `?nickname=eq.${encodeURIComponent(myNickname)}&select=extra_count`);
        const newExtra = extraRows.length ? extraRows[0].extra_count : 0;
        if(newExtra !== extraFireworkCount){
          extraFireworkCount = newExtra;
          changed = true;
        }
      }catch(e){ /* extra 테이블이 아직 없거나 행이 없으면 무시 */ }
      if(changed) updateFireworkButtonUi();
    }
  }catch(e){ console.warn("heartbeat 실패", e); }
}
function cleanupAndKickOut(until){
  clearInterval(presenceTimer);
  clearInterval(pollTimer);
  if(realtimeSocket){ try{ realtimeSocket.close(); }catch(e){} }
  renderBannedScreen(until);
}

function startPresencePolling(){
  refreshOnlineUsers();
  pollTimer = setInterval(refreshOnlineUsers, 10000);
}
async function refreshOnlineUsers(){
  try{
    const rows = await sbGet("chat_presence", "?select=nickname,last_seen,banned_until");
    const now = new Date();
    onlineUsers = rows.filter(r => (now - new Date(r.last_seen)) < PRESENCE_STALE_MS);
    const countEl = document.getElementById("onlineCount");
    if(countEl) countEl.textContent = `🟢 접속자 ${onlineUsers.length}명`;
    renderUserList();
  }catch(e){ console.warn("접속자 목록 갱신 실패", e); }
}

function setupSidePanel(){

  const scrim = document.getElementById("scrim");
  document.getElementById("userListBtn").onclick = () => {

function renderUserList(){
  const list = document.getElementById("userList");
  if(!list) return;
  if(onlineUsers.length === 0){
    list.innerHTML = `<div style="padding:14px; color:var(--ink-soft); font-size:13px;">접속자가 없어요.</div>`;
    return;
  }
  list.innerHTML = onlineUsers.map(u => {
    const safeName = escapeHtml(u.nickname).replace(/'/g,"\\'");

    return `
    <div class="user-item">
      <span class="uname"><span class="dot"></span>${escapeHtml(u.nickname)}</span>

  }).join("");
}

async function adminKickUser(nickname){
  if(!isAdmin) return;
  if(!confirm(`'${nickname}' 님을 강퇴할까요? (${BAN_DURATION_MS/60000}분간 재입장 제한)`)) return;
  try{
    const until = new Date(Date.now() + BAN_DURATION_MS).toISOString();
    await sbPatch("chat_presence", `?nickname=eq.${encodeURIComponent(nickname)}`, { banned_until: until });
    await sbInsert("chat_messages", { nickname: "system", content: `${nickname} 님이 관리자에 의해 강퇴되었습니다.`, is_system: true });
    showToast(`${nickname} 님을 강퇴했어요.`);
    refreshOnlineUsers();
  }catch(e){
    console.error(e);
    showToast("강퇴에 실패했어요.");
  }
}

async function adminRefillFirework(nickname){
  if(!isAdmin) return;
  const input = prompt(`'${nickname}' 님에게 몇 회의 폭죽을 추가로 지급할까요? (기존 한도에 누적됩니다)`, "3");
  if(input === null) return;
  const amount = parseInt(input, 10);
  if(!Number.isInteger(amount) || amount <= 0){
    showToast("1 이상의 숫자를 입력해 주세요.");
    return;
  }
  try{
    const rows = await sbGet("chat_firework_extra", `?nickname=eq.${encodeURIComponent(nickname)}&select=extra_count`);
    const current = rows.length ? rows[0].extra_count : 0;
    const newExtra = current + amount;
    await sbUpsert("chat_firework_extra", { nickname, extra_count: newExtra, updated_at: new Date().toISOString() }, "nickname");
    await sbInsert("chat_messages", { nickname: "system", content: `🎁 관리자가 ${nickname} 님에게 폭죽 ${amount}회를 추가로 지급했습니다.`, is_system: true });
    showToast(`${nickname} 님에게 폭죽 ${amount}회를 지급했어요.`);
  }catch(e){
    console.error(e);
    showToast("리필에 실패했어요.");
  }
}

/* ----- 전체 참여자 대상 폭죽 리필 / 리셋 ----- */
async function adminRefillAllFirework(){
  if(!isAdmin) return;
  const input = prompt("전체 참여자에게 몇 회의 폭죽을 추가로 지급할까요? (기존 한도에 누적됩니다)", "3");
  if(input === null) return;
  const amount = parseInt(input, 10);
  if(!Number.isInteger(amount) || amount <= 0){
    showToast("1 이상의 숫자를 입력해 주세요.");
    return;
  }
  if(!confirm(`전체 참여자에게 폭죽 ${amount}회씩 지급할까요?`)) return;

  try{
    // 지금까지 한 번이라도 입장한 모든 닉네임을 대상으로 함 (presence 기록 기준)
    const allUsers = await sbGet("chat_presence", "?select=nickname");
    const targets = allUsers.map(u => u.nickname).filter(n => n !== ADMIN_NICKNAME);

    // 기존 extra_count 조회 (한 번에 가져와서 in-memory로 합산)
    const existingExtra = await sbGet("chat_firework_extra", "?select=nickname,extra_count");
    const extraMap = {};
    existingExtra.forEach(r => { extraMap[r.nickname] = r.extra_count; });

    // upsert는 여러 행을 한 번에 보낼 수 있어 배치로 처리
    const payload = targets.map(nickname => ({
      nickname,
      extra_count: (extraMap[nickname] || 0) + amount,
      updated_at: new Date().toISOString()
    }));
    if(payload.length > 0){
      await sbUpsert("chat_firework_extra", payload, "nickname");
    }

    await sbInsert("chat_messages", { nickname: "system", content: `🎁 관리자가 전체 참여자에게 폭죽 ${amount}회씩 추가로 지급했습니다!`, is_system: true });
    showToast(`전체 참여자에게 폭죽 ${amount}회씩 지급했어요.`);
  }catch(e){
    console.error(e);
    showToast("전체 리필에 실패했어요.");
  }
}

async function adminResetAllFirework(){
  if(!isAdmin) return;
  if(!confirm(`전체 참여자의 폭죽 사용 횟수를 초기화하고, 기본 ${MAX_FIREWORK_COUNT}회로 되돌릴까요?`)) return;

  try{
    await sbDelete("chat_firework_used", "?id=gt.0"); // 전체 삭제 (사용 기록 초기화)
    await sbDelete("chat_firework_extra", "?extra_count=gte.0"); // 추가 한도 초기화 (전체 행 삭제)
    await sbInsert("chat_messages", { nickname: "system", content: `🔄 관리자가 전체 참여자의 폭죽 횟수를 기본 ${MAX_FIREWORK_COUNT}회로 초기화했습니다.`, is_system: true });
    showToast(`전체 폭죽 횟수를 ${MAX_FIREWORK_COUNT}회로 초기화했어요.`);
  }catch(e){
    console.error(e);
    showToast("전체 리셋에 실패했어요.");
  }
}

/* =========================================================
   4) Realtime (Supabase Realtime - Postgres Changes)
   ========================================================= */
function connectRealtime(){
  try{
    realtimeSocket = new WebSocket(SB_WS);
  }catch(e){ console.warn("realtime 연결 실패, polling으로 대체", e); startMessagePollingFallback(); return; }

  realtimeSocket.onopen = () => {
    realtimeRetryDelay = 1000;
    subscribeToChanges("chat_messages");
    subscribeToChanges("chat_presence");
    subscribeToChanges("chat_firework_events");
    // heartbeat for phoenix channel
    realtimeSocket._hb = setInterval(() => {
      sendRealtimeMsg({ topic:"phoenix", event:"heartbeat", payload:{}, ref: String(Date.now()) });
    }, 25000);
  };
  realtimeSocket.onmessage = (evt) => {
    try{
      const msg = JSON.parse(evt.data);
      handleRealtimeMessage(msg);
    }catch(e){ /* ignore parse errors */ }
  };
  realtimeSocket.onclose = () => {
    clearInterval(realtimeSocket && realtimeSocket._hb);
    scheduleRealtimeReconnect();
  };
  realtimeSocket.onerror = () => {
    // onclose가 이어서 호출되므로 별도 처리 불필요
  };
}
function scheduleRealtimeReconnect(){
  setTimeout(() => {
    if(!myNickname) return;
    connectRealtime();
  }, realtimeRetryDelay);
  realtimeRetryDelay = Math.min(realtimeRetryDelay * 1.6, 15000);
}
function sendRealtimeMsg(obj){
  if(realtimeSocket && realtimeSocket.readyState === 1) realtimeSocket.send(JSON.stringify(obj));
}
let rtRefCounter = 1;
function subscribeToChanges(table){
  const topic = "realtime:public:" + table;
  sendRealtimeMsg({
    topic,
    event:"phx_join",
    payload:{
      config:{ postgres_changes:[{event:"*", schema:"public", table}] }
    },
    ref: String(rtRefCounter++)
  });
}
function handleRealtimeMessage(msg){
  if(msg.event !== "postgres_changes") return;
  const changes = msg.payload && msg.payload.data ? [msg.payload.data] : (msg.payload || []);
  (Array.isArray(changes) ? changes : [changes]).forEach(change => {
    if(!change || !change.record && !change.old_record) return;
    const table = msg.topic.split(":").pop();
    if(table === "chat_messages"){
      handleMessageChange(change);
    } else if(table === "chat_presence"){
      refreshOnlineUsers();
    } else if(table === "chat_firework_events"){
      handleFireworkEventChange(change);
    }
  });
}
function handleMessageChange(change){
  if(change.type === "INSERT" && change.record){
    if(change.record.id <= lastMessageId) return;
    lastMessageId = Math.max(lastMessageId, change.record.id);
    appendMessageEl(change.record);
  } else if(change.type === "DELETE" && change.old_record){
    const el = document.querySelector(`.messages [data-id="${change.old_record.id}"]`);
    if(el) el.remove();
  }
}
function handleFireworkEventChange(change){
  if(change.type === "INSERT" && change.record){
    if(change.record.id <= lastFireworkEventId) return;
    lastFireworkEventId = Math.max(lastFireworkEventId, change.record.id);
    playFireworkAnimation();
  }
}

/* ----- Realtime 연결이 안 될 때를 위한 폴백 (단순 polling) ----- */
function startMessagePollingFallback(){
  setInterval(async () => {
    try{
      const rows = await sbGet("chat_messages", `?select=*&id=gt.${lastMessageId}&order=created_at.asc`);
      rows.forEach(r => { lastMessageId = Math.max(lastMessageId, r.id); appendMessageEl(r); });
    }catch(e){ /* ignore */ }
    try{
      const fwRows = await sbGet("chat_firework_events", `?select=*&id=gt.${lastFireworkEventId}&order=created_at.asc`);
      fwRows.forEach(r => { lastFireworkEventId = Math.max(lastFireworkEventId, r.id); playFireworkAnimation(); });
    }catch(e){ /* ignore */ }
  }, 4000);
}

/* =========================================================
   5) 폭죽 효과 (기본 3회 + 관리자 리필 누적 / 관리자는 무제한, 전체 채팅방에 실시간 표시)
   ========================================================= */
function getMyFireworkMax(){
  return MAX_FIREWORK_COUNT + extraFireworkCount;
}
function updateFireworkButtonUi(){
  const fwBtn = document.getElementById("fwBtn");
  if(!fwBtn) return;
  if(isAdmin){
    fwBtn.disabled = false;
    fwBtn.title = "폭죽 쏘기 (관리자: 무제한)";
    fwBtn.textContent = "🎉";
    return;
  }
  const max = getMyFireworkMax();
  const remaining = max - fireworkUsedCount;
  if(remaining <= 0){
    fwBtn.disabled = true;
    fwBtn.title = "폭죽을 모두 사용했어요";
    fwBtn.textContent = "🎉";
  } else {
    fwBtn.disabled = false;
    fwBtn.title = `폭죽 쏘기 (남은 횟수 ${remaining}회)`;
    fwBtn.textContent = "🎉";
  }
}

async function launchMyFirework(){
  const max = getMyFireworkMax();
  const remaining = max - fireworkUsedCount;
  if(!isAdmin && remaining <= 0){
    alert("더 이상 폭죽을 발사할 수 없습니다.");
    return;
  }
  const ok = isAdmin
    ? confirm("폭죽을 발사할까요? (관리자는 횟수 제한이 없어요)")
    : confirm(`남은 폭죽 갯수: ${remaining}개\n폭죽을 발사할까요?`);
  if(!ok) return;

  const fwBtn = document.getElementById("fwBtn");
  fwBtn.disabled = true;
  try{
    if(!isAdmin){
      await sbInsert("chat_firework_used", { nickname: myNickname });
      fireworkUsedCount++;
    }
    const inserted = await sbInsert("chat_firework_events", { nickname: myNickname });
    if(Array.isArray(inserted) && inserted[0] && inserted[0].id){
      lastFireworkEventId = Math.max(lastFireworkEventId, inserted[0].id);
    }
    const myRemaining = getMyFireworkMax() - fireworkUsedCount;
    const remainTextForMe = isAdmin ? "관리자 무제한" : `남은 횟수 ${myRemaining}회`;
    // 전체 채팅방에 보이는 시스템 메시지에는 남은 횟수를 표시하지 않음 (본인만 알면 되는 정보)
    await sbInsert("chat_messages", { nickname: "system", content: `🎉 ${myNickname} 님이 폭죽을 쏘았습니다!`, is_system: true });
    playFireworkAnimation(); // 내 화면에서는 즉시 재생, 다른 사용자는 realtime 이벤트로 재생됨
    showToast(`폭죽을 발사했어요! (${remainTextForMe})`);
  }catch(e){
    console.error(e);
    showToast("폭죽 발사에 실패했어요.");
  } finally {
    updateFireworkButtonUi();
  }
}

/* canvas 기반 폭죽 파티클 애니메이션 */
const fwCanvas = document.getElementById("fwCanvas");
const fwCtx = fwCanvas.getContext("2d");
function resizeFwCanvas(){
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}
resizeFwCanvas();
window.addEventListener("resize", resizeFwCanvas);

let fwParticles = [];
let fwAnimRunning = false;
const FW_COLORS = ["#FF6B7A","#FFC93C","#5FA777","#5B9BD5","#FF8C97","#E84F62","#FFD75E"];

function playFireworkAnimation(){
  const burstCount = 6;
  for(let i=0;i<burstCount;i++){
    setTimeout(() => spawnBurst(
      Math.random()*fwCanvas.width*0.7 + fwCanvas.width*0.15,
      Math.random()*fwCanvas.height*0.45 + fwCanvas.height*0.1
    ), i*330);
  }
  if(!fwAnimRunning){
    fwAnimRunning = true;
    requestAnimationFrame(stepFwAnimation);
  }
}
function spawnBurst(x, y){
  const color = FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
  const count = 60;
  for(let i=0;i<count;i++){
    const angle = (Math.PI*2*i)/count + Math.random()*0.2;
    const speed = 3 + Math.random()*4;
    fwParticles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed,
      life: 110 + Math.random()*40,  // 약 1.8~2.5초 (60fps 기준)
      age: 0,
      color,
      size: 2.2 + Math.random()*2.4
    });
  }
}
function stepFwAnimation(){
  // 살짝 남기는 잔상 효과로 트레일 느낌을 줌 (완전히 지우지 않고 반투명하게 덮기)
  fwCtx.fillStyle = "rgba(0,0,0,0)";
  fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  fwParticles.forEach(p => {
    p.vy += 0.035; // gravity (느리게 떨어지도록 살짝 약화)
    p.vx *= 0.992; // 공기저항으로 서서히 느려짐
    p.vy *= 0.992;
    p.x += p.vx;
    p.y += p.vy;
    p.age++;
    const alpha = Math.max(0, 1 - p.age/p.life);
    fwCtx.globalAlpha = alpha;
    fwCtx.fillStyle = p.color;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    fwCtx.fill();
  });
  fwCtx.globalAlpha = 1;
  fwParticles = fwParticles.filter(p => p.age < p.life);
  if(fwParticles.length > 0){
    requestAnimationFrame(stepFwAnimation);
  } else {
    fwAnimRunning = false;
    fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height);
  }
}

/* =========================================================
   6) QR코드 초대 모달
   ========================================================= */
function setupQrModal(){
  document.getElementById("qrBtn").onclick = openQrModal;
}
function openQrModal(){
  const url = window.location.origin + window.location.pathname;
  const bg = document.createElement("div");
  bg.className = "qr-modal-bg";
  bg.innerHTML = `
    <div class="qr-modal">
      <h3>📱 QR코드로 초대하기</h3>
      <div class="qr-box" id="qrBox"></div>
      <div class="qr-url">${url}</div>
      <button id="qrCloseBtn">닫기</button>
    </div>
  `;
  document.body.appendChild(bg);
  new QRCode(document.getElementById("qrBox"), { text: url, width: 180, height: 180 });
  bg.querySelector("#qrCloseBtn").onclick = () => bg.remove();
  bg.onclick = (e) => { if(e.target === bg) bg.remove(); };
}

/* =========================================================
   7) 사진 확대보기 모달
   ========================================================= */
function openPhotoViewer(url){
  const bg = document.createElement("div");
  bg.className = "photo-viewer-bg";
  bg.innerHTML = `
    <button class="photo-viewer-close" id="photoViewerClose">✕</button>
    <img class="photo-viewer-img" src="${escapeHtml(url)}" alt="사진 확대보기" />
  `;
  document.body.appendChild(bg);
  bg.querySelector("#photoViewerClose").onclick = () => bg.remove();
  bg.onclick = (e) => { if(e.target === bg) bg.remove(); };
}
